name: Publish to public npm

# Publishes the public build to the PUBLIC registry (registry.npmjs.org) as
# @integratex/mailman. Trigger it manually (Actions tab -> Run workflow) or by
# publishing a GitHub Release. Requires:
#   - the `integratex` org on npmjs.com (owns the @integratex scope)
#   - a repo secret NPM_TOKEN (an npm "Automation" token with publish rights)
on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # points npm at the PUBLIC registry and wires NODE_AUTH_TOKEN into .npmrc
          registry-url: 'https://registry.npmjs.org'

      # keytar's native module builds against libsecret headers on Linux.
      - name: Install libsecret (for keytar)
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # The committed package.json is the INTERNAL identity (@indianic/mailman
      # with publishConfig.registry pointing at npm.indianic.in) so local
      # release-indianic keeps working. Rewrite both in CI only: the public
      # build ships as @integratex/mailman on the registry configured by
      # setup-node above. The rename must happen BEFORE `npm publish` packs the
      # tarball — the code reads its own package.json name at runtime (editor
      # MCP configs, the scheduled-send ticker, self-update), so a public
      # install must see @integratex/mailman there or those npx/registry
      # lookups resolve a package visitors can't fetch.
      - name: Target the public registry and name for this publish
        run: |
          npm pkg set name=@integratex/mailman
          npm pkg delete publishConfig.registry

      - name: Publish (public, scoped)
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
