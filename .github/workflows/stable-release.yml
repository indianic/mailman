name: Stable Release

# Fires ONLY on stable-v* tags (e.g. stable-v1.0.0). Regular v* tags — used
# by the internal npm.indianic.in release flow — are ignored here on purpose.
on:
  push:
    tags:
      - 'stable-v*'

permissions:
  contents: write # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # keytar's native module builds against libsecret headers on Linux
      # when no matching prebuilt binary is available.
      - name: Install libsecret (for keytar)
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Package the exact publishable tarball and attach it to the release,
      # so a stable tag ships a verifiable artifact (not just source).
      - name: Pack tarball
        run: npm pack

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#stable-v}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { flag=1; next }
            /^## \[/ && flag { exit }
            flag { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Stable release ${GITHUB_REF_NAME} of @indianic/mailman." > RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            ./*.tgz
