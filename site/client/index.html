      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "MailMan",

    <script>
      // Apply theme before paint to avoid a flash. Light is the default for
      // everyone — only an explicit 'dark' choice opts in.
      (function () {
        try {
          if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          // default: light — add nothing
        }
      })();
    </script>
